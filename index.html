<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スプレッドシート連携・長英文暗唱トレーナー</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; max-width: 650px; margin: 40px auto; padding: 20px; text-align: center; background-color: #f4f6f9; color: #333; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        #japanese-text { font-size: 18px; font-weight: bold; margin-bottom: 25px; text-align: left; background: #eef5ff; padding: 15px; border-left: 5px solid #007bff; border-radius: 4px; min-height: 40px; }
        #english-display { font-size: 22px; color: #111; min-height: 100px; text-align: left; margin-bottom: 30px; letter-spacing: 0.5px; word-wrap: break-word; }
        
        .btn-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; font-size: 16px; padding: 15px 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: all 0.2s; }
        .btn-left { background-color: #28a745; color: white; }
        .btn-center { background-color: #007bff; color: white; }
        .btn-right { background-color: #dc3545; color: white; }
        .btn-next { background-color: #17a2b8; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        
        button:disabled { background-color: #ccc !important; color: #666; cursor: not-allowed; }
        .active-word { color: #007bff; font-weight: bold; }
        #status-msg { font-size: 14px; color: #666; margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <h2>長英文 暗唱トレーナー <span style="font-size:16px; color:#666;">(Sheet連携版)</span></h2>
    
    <div class="card">
        <div id="japanese-text">スプレッドシートからデータを読み込み中...</div>
        
        <div id="english-display"></div>
        
        <div class="btn-group">
            <button class="btn-left" id="btn-char" onclick="showNextChar()">1文字</button>
            <button class="btn-center" id="btn-word" onclick="showNextWord()">1単語</button>
            <button class="btn-right" id="btn-all" onclick="showAll()">回答</button>
        </div>
        <button class="btn-next" id="btn-next-q" onclick="nextQuestion()">次のランダム問題へ ➔</button>
        
        <div id="status-msg"></div>
    </div>

    <script>
        // =================================================================
        // 【設定】ここにステップ3でコピーしたスプレッドシートのURLを貼り付けてください
        // =================================================================
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUiaAElu70JdhrPD_TtXEGJo3tOI8ppj8R2BX6K7Oi4zVEe0uZcup05QkaqzZ0pDo5q0minks7Zr-a/pub?gid=0&single=true&output=csv";

        let questionBank = []; // スプレッドシートから読み込んだ問題リストが入る配列
        let currentQuestion = null;
        let words = [];
        let currentWordIdx = 0;
        let currentCharIdx = 0;

        const jpElem = document.getElementById("japanese-text");
        const enElem = document.getElementById("english-display");
        const btnChar = document.getElementById("btn-char");
        const btnWord = document.getElementById("btn-word");
        const btnAll = document.getElementById("btn-all");
        const btnNext = document.getElementById("btn-next-q");
        const statusElem = document.getElementById("status-msg");

        // 起動時にスプレッドシートからデータを取得する
        fetchQuestions();

        // 非同期でスプレッドシート（CSV）を読み込む関数
        async function fetchQuestions() {
            try {
                toggleAllButtons(true);
                jpElem.innerText = "スプレッドシートから最新データを取得しています...";
                
                const response = await fetch(sheetUrl);
                if (!response.ok) throw new Error("データの取得に失敗しました。URLを確認してください。");
                
                const csvText = await response.text();
                
                // CSVデータを解析（簡易的な行・カンマ区切り処理）
                const rows = csvText.split(/\r?\n/);
                questionBank = [];

                // 0行目は見出し(日本文,英文)なので、1行目（i=1）から処理する
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue; // 空行はスキップ
                    
                    // カンマで分割（シンプルなCSVパース。文章内のカンマ対応のため分割数を2に制限）
                    const parts = rows[i].split(/,(.*)/); 
                    if (parts.length >= 2) {
                        // 前後の不要なダブルクォーテーションやスペースを削除
                        const jp = parts[0].replace(/^"|"$/g, '').trim();
                        const en = parts[1].replace(/^"|"$/g, '').trim();
                        if (jp && en) {
                            questionBank.push({ jp: jp, en: en });
                        }
                    }
                }

                if (questionBank.length === 0) {
                    jpElem.innerText = "エラー: スプレッドシートに有効な問題が見つかりませんでした。";
                    return;
                }

                statusElem.innerText = `全 ${questionBank.length} 問の読み込み完了`;
                nextQuestion();

            } catch (error) {
                console.error(error);
                jpElem.innerText = "データの読み込みに失敗しました。インターネット接続やスプレッドシートの「Webに公開」設定を確認してください。";
            }
        }

        // 次のランダム問題へ
        function nextQuestion() {
            if (questionBank.length === 0) return;

            const randomIdx = Math.floor(Math.random() * questionBank.length);
            currentQuestion = questionBank[randomIdx];

            // 英文を単語に分解（連続するスペースも考慮）
            words = currentQuestion.en.split(/\s+/);
            currentWordIdx = 0;
            currentCharIdx = 0;

            jpElem.innerText = currentQuestion.jp;
            togglePlayButtons(false);
            btnNext.disabled = false;
            renderDisplay();
        }

        // 画面描画
        function renderDisplay() {
            if (currentWordIdx >= words.length) {
                enElem.innerText = currentQuestion.en;
                togglePlayButtons(true);
                return;
            }

            let html = "";
            for (let i = 0; i < currentWordIdx; i++) {
                html += words[i] + " ";
            }

            if (currentCharIdx > 0) {
                const targetWord = words[currentWordIdx];
                const visiblePart = targetWord.substring(0, currentCharIdx);
                html += `<span class="active-word">${visiblePart}</span>`;
            }

            enElem.innerHTML = html || "<span style='color:#aaa;'>ボタンを押してスタート</span>";
        }

        // showNextCharなどの関数は省略せずに保持
        function showNextChar() {
            const targetWord = words[currentWordIdx];
            currentCharIdx++;
            if (currentCharIdx >= targetWord.length) {
                currentWordIdx++;
                currentCharIdx = 0;
            }
            renderDisplay();
        }

        // 1単語進める
        function showNextWord() {
            currentWordIdx++;
            currentCharIdx = 0;
            renderDisplay();
        }

        // 全て表示
        function showAll() {
            enElem.innerText = currentQuestion.en;
            togglePlayButtons(true);
        }

        function togglePlayButtons(disabled) {
            btnChar.disabled = disabled;
            btnWord.disabled = disabled;
            btnAll.disabled = disabled;
        }

        function toggleAllButtons(disabled) {
            togglePlayButtons(disabled);
            btnNext.disabled = disabled;
        }
    </script>
</body>
</html>
